{% extends "admin/change_list.html" %}
{% load i18n %}

{% block object-tools-items %}
  <li>
    <form action="{% url 'admin:catalog_pipelinefilter_apply_filters' %}" method="post" style="display:inline">
      {% csrf_token %}
      <button type="submit" name="preview" class="button" style="cursor:pointer"
              onclick="this.disabled=true; this.textContent='Running...'; this.form.submit();">
        Preview Filters (Dry Run)
      </button>
    </form>
  </li>
  <li>
    <form action="{% url 'admin:catalog_pipelinefilter_apply_filters' %}" method="post" style="display:inline"
          onsubmit="return confirm('This will disable all products matching active filters. Continue?')">
      {% csrf_token %}
      <input type="hidden" name="execute" value="1">
      <button type="submit" class="button" style="cursor:pointer; background:#ba2121; color:#fff"
              onclick="this.disabled=true; this.textContent='Running...'; this.form.submit();">
        Apply Filters (Disable Products)
      </button>
    </form>
  </li>
  {{ block.super }}
{% endblock %}
